# Repo-local Codex config — shared across all platforms.
# Platform-specific overrides (project path, sandbox) go in .codex/config.local.toml
# which is gitignored. Copy config.local.toml.example to config.local.toml and edit.

personality = "pragmatic"
model = "gpt-5.4"
model_reasoning_effort = "medium"

[features]

[agents]
max_threads = 12
max_depth = 2
job_max_runtime_seconds = 1800

[plugins."github@openai-curated"]
enabled = true

[plugins."build-web-apps@openai-curated"]
enabled = true
